---
"zh-TW":
  "competition_setup":
    "directors":
      "index":
        "add_director": >-
          新增總監
        "create_director": >-
          建立總監
        "description": >-
          賽事總監被指派至特定競賽類別。他們將能夠為其比賽項目建立與管理出發名單、裁判及數據錄入志工
        "director": >-
          總監 / 賽事總監
        "header": >-
          管理總監名單
        "note_1": >-
          比賽項目必須先由「競賽管理員」（通常就是您）配置完成，總監才能開始管理該項目的出發名單。
        "note_2": >-
          總監無法自行建立比賽項目，因為項目的詳細設定通常比總監所認知的更為細膩且複雜。
