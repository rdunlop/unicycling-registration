de:
  registrant_group_types: >-
    Anmeldegruppen-Typen
  events_which_require_multiple_registrants_to_compete: >-
    Disziplinen, die erfordern, dass mehrere Angemeldete gemeinsam als Gruppe antreten, sind hier aufgelistet. Bitte verwende diese Seiten, um anzugeben, mit wem du antreten wirst.
  note_html: >-
    <b>Hinweis</b> Der Disziplinleiter hat die endgültige Kontrolle über die Mitgliedschaft jeder Gruppe. Diese Seiten geben nur die <i>gewünschten</i> Gruppenmitgliedschaften an.
  please_chose_event: >-
    Bitte wähle eine Disziplin aus, um mit der Angabe der Mitgliedschaft für deine(n) Angemeldeten zu beginnen.
